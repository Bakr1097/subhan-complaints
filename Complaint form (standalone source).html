<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Subhan Travels · Complaint form</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" />

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #1a1d22;
    min-height: 100vh;
    font-family: 'Geist', system-ui, sans-serif;
    color: #e8e8ea;
    overflow-x: hidden;
  }

  /* Page chrome — designer's stage around the phone */
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 80px;
    gap: 28px;
    background:
      radial-gradient(circle at 15% 0%, #2a2e36 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, #2b2530 0%, transparent 50%),
      #16181c;
  }

  .stage-meta {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    color: #a7adbb;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .stage-meta .eyebrow {
    color: #6b7180;
  }
  .stage-meta h1 {
    font-family: 'Geist', system-ui, sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: #f3f4f6;
    margin: 0;
    text-transform: none;
  }
  .stage-meta p {
    margin: 0;
    color: #8b91a3;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 12.5px;
    text-transform: none;
    letter-spacing: 0;
    line-height: 1.4;
    max-width: 380px;
  }

  .direction-badges {
    display: inline-flex;
    gap: 6px;
    margin-top: 4px;
  }
  .direction-badges span {
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #b3b8c5;
    font-size: 10px;
    letter-spacing: 0.12em;
  }

  /* When prototype-only mode is on, hide the stage chrome */
  body.no-stage .stage { padding: 0; background: transparent; gap: 0; }
  body.no-stage .stage-meta { display: none; }
  body.no-stage { background: transparent; }
  body.no-stage .device-shell { transform: none; }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
  <template id="__bundler_thumbnail" data-bg-color="#0F5D4E">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0F5D4E"/>
      <!-- Bus mark, centered -->
      <g transform="translate(600 400)" fill="none" stroke="#F7F3E9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
        <!-- bus body -->
        <rect x="-160" y="-110" width="320" height="220" rx="36" />
        <!-- window strip -->
        <line x1="-160" y1="-25" x2="160" y2="-25" />
        <!-- wheels -->
        <line x1="-100" y1="110" x2="-100" y2="150" />
        <line x1="100"  y1="110" x2="100"  y2="150" />
        <!-- headlights -->
        <circle cx="-110" cy="60" r="6" fill="#F7F3E9" stroke="none" />
        <circle cx="110"  cy="60" r="6" fill="#F7F3E9" stroke="none" />
      </g>
      <!-- Road dashes underneath -->
      <g stroke="#F7F3E9" stroke-width="12" stroke-linecap="round" opacity="0.55">
        <line x1="280"  y1="640" x2="360"  y2="640" />
        <line x1="420"  y1="640" x2="500"  y2="640" />
        <line x1="560"  y1="640" x2="640"  y2="640" />
        <line x1="700"  y1="640" x2="780"  y2="640" />
        <line x1="840"  y1="640" x2="920"  y2="640" />
      </g>
      <!-- Wordmark -->
      <text x="600" y="740" text-anchor="middle"
            font-family="Geist, system-ui, sans-serif" font-weight="700"
            font-size="32" letter-spacing="8" fill="#F7F3E9">SUBHAN TRAVELS</text>
    </svg>
  </template>

  <div id="stage" class="stage">
    <div class="stage-meta">
      <div class="eyebrow">Subhan Travels · v2</div>
      <h1>Passenger complaint intake</h1>
      <p>Mobile-first form for QR-code intake on every bus. Use the Tweaks panel to switch visual directions.</p>
      <div class="direction-badges" id="dir-badges"></div>
    </div>

    <div id="device-mount" class="device-shell"></div>
  </div>

  <!-- Component scripts -->
  <script type="text/babel" src="themes.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="complaint-form.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "direction": "service",
      "iconStyle": "soft",
      "density": "comfortable",
      "trustStrip": true,
      "showConfirmation": false,
      "preselectCategory": true,
      "framed": true,
      "heroLine": "Tell us what happened."
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Update body class based on framed
      React.useEffect(() => {
        document.body.classList.toggle('no-stage', !t.framed);
      }, [t.framed]);

      // Render badge showing direction
      React.useEffect(() => {
        const el = document.getElementById('dir-badges');
        if (!el) return;
        const dir = window.THEMES[t.direction];
        el.innerHTML = '';
        const s = document.createElement('span');
        s.textContent = dir ? `${dir.name} · ${dir.blurb}` : t.direction;
        el.appendChild(s);
      }, [t.direction]);

      const formEl = <ComplaintForm tweaks={t} />;

      const content = t.framed ? (
        <IOSDevice width={402} height={874}>
          {formEl}
        </IOSDevice>
      ) : (
        <div style={{
          width: '100vw', minHeight: '100vh',
          maxWidth: 460, margin: '0 auto',
        }}>
          {formEl}
        </div>
      );

      return (
        <>
          {content}
          <TweaksPanel title="Tweaks">
            <TweakSection label="Visual direction">
              <TweakRadio
                label="Theme"
                value={t.direction}
                options={[
                  { value: 'service',   label: 'Service' },
                  { value: 'editorial', label: 'Editorial' },
                  { value: 'clay',      label: 'Warm Clay' },
                ]}
                onChange={(v) => setTweak('direction', v)}
              />
              <TweakRadio
                label="Category icon"
                value={t.iconStyle}
                options={[
                  { value: 'soft',    label: 'Soft tile' },
                  { value: 'glyph',   label: 'Glyph only' },
                ]}
                onChange={(v) => setTweak('iconStyle', v)}
              />
              <TweakRadio
                label="Density"
                value={t.density}
                options={[
                  { value: 'comfortable', label: 'Roomy' },
                  { value: 'compact',     label: 'Tight' },
                ]}
                onChange={(v) => setTweak('density', v)}
              />
              <TweakText
                label="Hero line"
                value={t.heroLine}
                onChange={(v) => setTweak('heroLine', v)}
              />
            </TweakSection>

            <TweakSection label="States">
              <TweakToggle
                label="Trust strip"
                value={t.trustStrip}
                onChange={(v) => setTweak('trustStrip', v)}
              />
              <TweakToggle
                label="Category preselected"
                value={t.preselectCategory}
                onChange={(v) => setTweak('preselectCategory', v)}
              />
              <TweakToggle
                label="Confirmation screen"
                value={t.showConfirmation}
                onChange={(v) => setTweak('showConfirmation', v)}
              />
            </TweakSection>

            <TweakSection label="Display">
              <TweakToggle
                label="Phone frame"
                value={t.framed}
                onChange={(v) => setTweak('framed', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('device-mount'));
    root.render(<App />);
  </script>
</body>
</html>
